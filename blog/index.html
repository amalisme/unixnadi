<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Primary Meta Tags -->
  <title>Blog — UnixPulse</title>
  <meta name="description" content="Notes on Linux, VMware, AIX, HP-UX, and Web Dev. Practical guides and troubleshooting tips from the field.">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="Blog — UnixPulse">
  <meta property="og:description" content="Notes on Linux, VMware, AIX, HP-UX, and Web Dev. Practical guides and troubleshooting tips from the field.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://unixpulse.com/blog/">

  <!-- Canonical & Feeds -->
  <link rel="canonical" href="https://unixpulse.com/blog/">
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <link rel="alternate" type="application/rss+xml" title="UnixPulse RSS Feed" href="/rss.xml">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600;700&family=JetBrains+Mono:wght@400;500&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="/css/style.css">

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XK81HF7D25"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XK81HF7D25');
  </script>

  <!-- Google AdSense -->
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5557027774085981"
       crossorigin="anonymous"></script>

  <style>
    /* ── Blog Index Specific Styles ── */

    .blog-header {
      padding: var(--space-3xl) 0 var(--space-xl);
      border-bottom: 1px solid var(--border-color);
      margin-bottom: var(--space-xl);
    }

    .blog-header h1 {
      font-family: var(--font-display);
      color: var(--text-heading);
      margin-bottom: var(--space-sm);
    }

    .blog-header p {
      color: var(--text-secondary);
      font-size: 1.0625rem;
    }

    /* ── Category Filter Bar ── */
    .category-filter {
      margin-bottom: var(--space-xl);
    }

    .category-filter-label {
      font-size: 0.8125rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-secondary);
      margin-bottom: var(--space-md);
    }

    .filter-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      align-items: center;
    }

    .filter-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: var(--radius-xl);
      border: 1.5px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-decoration: none;
    }

    .filter-btn:hover {
      border-color: var(--accent-primary);
      color: var(--accent-primary);
      background: var(--bg-secondary);
    }

    .filter-btn.active {
      background: var(--accent-primary);
      border-color: var(--accent-primary);
      color: #fff;
    }

    .filter-btn .count {
      font-size: 0.75rem;
      opacity: 0.75;
    }

    /* VMware subcategory row */
    .subcategory-row {
      display: none;
      flex-wrap: wrap;
      gap: var(--space-sm);
      margin-top: var(--space-sm);
      padding: var(--space-sm) var(--space-md);
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      align-items: center;
    }

    .subcategory-row.visible {
      display: flex;
    }

    .subcategory-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-secondary);
      margin-right: var(--space-xs);
    }

    .filter-btn.sub {
      padding: 4px 12px;
      font-size: 0.8125rem;
    }

    .filter-btn.sub.active {
      background: var(--color-turquoise);
      border-color: var(--color-turquoise);
      color: #fff;
    }

    /* ── Post Grid ── */
    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--space-xl);
      margin-bottom: var(--space-3xl);
    }

    .post-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      padding: var(--space-xl);
      transition: box-shadow var(--transition-base), transform var(--transition-base);
      display: flex;
      flex-direction: column;
    }

    .post-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }

    .post-card-meta {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
      flex-wrap: wrap;
    }

    .post-category-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: var(--radius-xl);
      font-size: 0.75rem;
      font-weight: 600;
      text-decoration: none;
      transition: opacity var(--transition-fast);
    }

    .post-category-badge:hover { opacity: 0.8; }

    /* Badge colours by category */
    .badge-linux   { background: #e8f5e9; color: #2e7d32; }
    .badge-vmware  { background: #e3f2fd; color: #1565c0; }
    .badge-aix     { background: #fce4ec; color: #c62828; }
    .badge-hp-ux   { background: #f3e5f5; color: #6a1b9a; }
    .badge-web-dev { background: #fff8e1; color: #f57f17; }

    [data-theme="dark"] .badge-linux   { background: #1b3a1e; color: #81c784; }
    [data-theme="dark"] .badge-vmware  { background: #0d2137; color: #64b5f6; }
    [data-theme="dark"] .badge-aix     { background: #3b0d12; color: #ef9a9a; }
    [data-theme="dark"] .badge-hp-ux   { background: #2a0d35; color: #ce93d8; }
    [data-theme="dark"] .badge-web-dev { background: #332600; color: #ffcc02; }

    .post-date {
      font-size: 0.8125rem;
      color: var(--text-secondary);
    }

    .post-read-time {
      font-size: 0.8125rem;
      color: var(--text-secondary);
      margin-left: auto;
    }

    .post-card h2 {
      font-family: var(--font-display);
      font-size: 1.1875rem;
      font-weight: 600;
      color: var(--text-heading);
      margin-bottom: var(--space-sm);
      line-height: 1.4;
    }

    .post-card h2 a {
      color: inherit;
      text-decoration: none;
      transition: color var(--transition-fast);
    }

    .post-card h2 a:hover { color: var(--accent-primary); }

    .post-excerpt {
      color: var(--text-secondary);
      font-size: 0.9375rem;
      line-height: 1.6;
      flex: 1;
      margin-bottom: var(--space-md);
    }

    .post-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border-color);
      padding-top: var(--space-md);
      margin-top: auto;
    }

    .read-more-link {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--accent-primary);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: gap var(--transition-fast);
    }

    .read-more-link:hover { gap: 8px; }

    /* Empty state */
    .no-posts {
      grid-column: 1 / -1;
      text-align: center;
      padding: var(--space-3xl);
      color: var(--text-secondary);
    }

    .no-posts p { margin-bottom: var(--space-md); }

    /* Results count */
    .results-summary {
      font-size: 0.875rem;
      color: var(--text-secondary);
      margin-bottom: var(--space-lg);
    }

    .results-summary strong {
      color: var(--text-primary);
    }

    .post-card.hidden {
      display: none;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container header-inner">

        <svg viewBox="0 0 200 50" fill="none" aria-hidden="true">
          <path d="M8 15 L18 25 L8 35" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M28 25 L38 25 L44 12 L52 38 L60 18 L66 32 L72 25 L82 25" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="92" y="32" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="currentColor">
            <tspan>Unix</tspan><tspan font-weight="400">Pulse</tspan>
          </text>
        </svg>
      </a>
      <nav class="nav" aria-label="Main navigation">
        <ul class="nav-list">
          <li><a href="/" class="nav-link">Home</a></li>
          <li><a href="/blog/" class="nav-link active">Blog</a></li>
          <li><a href="/toolbox" class="nav-link">Toolbox</a></li>
          <li><a href="/projects" class="nav-link">Projects</a></li>
          <li><a href="/work-with-me" class="nav-link">Work With Me</a></li>

        </ul>
        <button class="theme-toggle" aria-label="Toggle dark mode" title="Toggle theme">
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
        <button class="mobile-menu-btn" aria-label="Toggle menu" aria-expanded="false">
          <svg class="icon-menu" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
          <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none;"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main>
    <div class="container">

      <!-- Page Header -->
      <div class="blog-header">
        <h1>The Blog</h1>
        <p>Notes on Linux, VMware, AIX, HP-UX, and building simple websites. Practical stuff from the field.</p>
      </div>

      <!-- Category Filter -->
      <div class="category-filter" role="navigation" aria-label="Filter posts by category">
        <div class="category-filter-label">Browse by category</div>

        <div class="filter-tabs" id="filterTabs">
          <button class="filter-btn active" data-filter="all">
            All <span class="count" id="countAll"></span>
          </button>
          <button class="filter-btn" data-filter="linux">
            🐧 Linux <span class="count" id="countLinux"></span>
          </button>
          <button class="filter-btn" data-filter="vmware" data-has-sub="true">
            ☁️ VMware <span class="count" id="countVmware"></span>
          </button>
          <button class="filter-btn" data-filter="aix">
            💾 AIX <span class="count" id="countAix"></span>
          </button>
          <button class="filter-btn" data-filter="hp-ux">
            🖥️ HP-UX <span class="count" id="countHpux"></span>
          </button>
          <button class="filter-btn" data-filter="web-dev">
            🌐 Web Dev <span class="count" id="countWebdev"></span>
          </button>
        </div>

        <!-- VMware subcategory row -->
        <div class="subcategory-row" id="vmwareSubcats" role="group" aria-label="VMware subcategories">
          <span class="subcategory-label">Subcategory:</span>
          <button class="filter-btn sub active" data-sub="all">All VMware</button>
          <button class="filter-btn sub" data-sub="vcenter">vCenter</button>
          <button class="filter-btn sub" data-sub="esxi">ESXi</button>
          <button class="filter-btn sub" data-sub="aria-operations">Aria Operations</button>
          <button class="filter-btn sub" data-sub="aria-operations-for-networks">Aria Ops for Networks</button>
          <button class="filter-btn sub" data-sub="chargeback">Chargeback</button>
          <button class="filter-btn sub" data-sub="vsphere">vSphere</button>
        </div>
      </div>

      <!-- Results summary -->
      <p class="results-summary" id="resultsSummary" aria-live="polite"></p>

      <!-- Post Grid -->
      <div class="post-grid" id="postGrid">
        <!-- Posts injected by JS -->
      </div>

    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="container footer-inner">
      <p class="footer-text">© 2026 UnixPulse. Made with ☕ and curiosity.</p>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="/about" class="footer-link">About</a>
        <a href="/say-hello" class="footer-link">Contact</a>
        <a href="/rss.xml" class="footer-link rss-link" aria-label="RSS Feed">
          <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19 7.38 20 6.18 20C5 20 4 19 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/></svg>
          RSS
        </a>
      </nav>
    </div>
  </footer>

  <script src="/js/main.js"></script>

  <script>
  (async function () {

    const grid       = document.getElementById('postGrid');
    const summary    = document.getElementById('resultsSummary');
    const filterBtns = document.querySelectorAll('.filter-btn:not(.sub)');
    const subBtns    = document.querySelectorAll('.filter-btn.sub');
    const subRow     = document.getElementById('vmwareSubcats');

    let posts        = [];
    let activeFilter = 'all';
    let activeSub    = 'all';

    const badgeClass = {
      'linux'  : 'badge-linux',
      'vmware' : 'badge-vmware',
      'aix'    : 'badge-aix',
      'hp-ux'  : 'badge-hp-ux',
      'web-dev': 'badge-web-dev'
    };

    const catLabel = {
      'linux'  : 'Linux',
      'vmware' : 'VMware',
      'aix'    : 'AIX',
      'hp-ux'  : 'HP-UX',
      'web-dev': 'Web Dev'
    };

    const subLabel = {
      'vcenter'                     : 'vCenter',
      'esxi'                        : 'ESXi',
      'aria-operations'             : 'Aria Operations',
      'aria-operations-for-networks': 'Aria Ops for Networks',
      'chargeback'                  : 'Chargeback'
    };

    function postUrl(post) {
      return `/blog/${post.categoryPath}/${post.slug}`;
    }

    function categoryUrl(path) {
      return `/blog/${path}/`;
    }

    function buildCard(post) {
      const catPath   = post.categoryPath;
      const topCat    = catPath.split('/')[0];
      const subCat    = catPath.split('/')[1] || '';
      const badgeCls  = badgeClass[topCat] || 'badge-linux';
      const badgeTxt  = subCat ? `${catLabel[topCat]} › ${subLabel[subCat]}` : catLabel[topCat];
      const badgeHref = categoryUrl(catPath);

      return `
        <article class="post-card"
          data-category="${topCat}"
          data-subcategory="${subCat}"
          data-path="${catPath}">
          <div class="post-card-meta">
            <a href="${badgeHref}" class="post-category-badge ${badgeCls}" aria-label="Category: ${badgeTxt}">${badgeTxt}</a>
            <span class="post-date">${post.dateDisplay}</span>
            <span class="post-read-time">${post.readTime}</span>
          </div>
          <h2><a href="${postUrl(post)}">${post.title}</a></h2>
          <p class="post-excerpt">${post.excerpt}</p>
          <div class="post-card-footer">
            <a href="${postUrl(post)}" class="read-more-link">Read more →</a>
          </div>
        </article>`;
    }

    function updateCounts(posts) {
      const counts = { all: posts.length, linux: 0, vmware: 0, aix: 0, 'hp-ux': 0, 'web-dev': 0 };
      posts.forEach(p => {
        const top = p.categoryPath.split('/')[0];
        if (counts[top] !== undefined) counts[top]++;
      });
      document.getElementById('countAll').textContent    = `(${counts.all})`;
      document.getElementById('countLinux').textContent  = `(${counts['linux']})`;
      document.getElementById('countVmware').textContent = `(${counts['vmware']})`;
      document.getElementById('countAix').textContent    = `(${counts['aix']})`;
      document.getElementById('countHpux').textContent   = `(${counts['hp-ux']})`;
      document.getElementById('countWebdev').textContent = `(${counts['web-dev']})`;
    }

    function applyFilter() {
      const cards = grid.querySelectorAll('.post-card');
      let visible = 0;

      cards.forEach(card => {
        const cat = card.dataset.category;
        const sub = card.dataset.subcategory;
        let show  = false;

        if (activeFilter === 'all') {
          show = true;
        } else if (activeFilter === 'vmware') {
          show = activeSub === 'all' ? cat === 'vmware' : cat === 'vmware' && sub === activeSub;
        } else {
          show = cat === activeFilter;
        }

        card.classList.toggle('hidden', !show);
        if (show) visible++;
      });

      let emptyEl = grid.querySelector('.no-posts');
      if (visible === 0) {
        if (!emptyEl) {
          emptyEl = document.createElement('div');
          emptyEl.className = 'no-posts';
          emptyEl.innerHTML = '<p>No posts in this category yet — check back soon.</p>';
          grid.appendChild(emptyEl);
        }
      } else {
        if (emptyEl) emptyEl.remove();
      }

      const filterName = activeFilter === 'all' ? 'all categories' :
                         activeFilter === 'vmware' && activeSub !== 'all'
                           ? `VMware › ${subLabel[activeSub]}`
                           : catLabel[activeFilter] || activeFilter;
      summary.innerHTML = `Showing <strong>${visible}</strong> post${visible !== 1 ? 's' : ''} in <strong>${filterName}</strong>`;
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        activeSub    = 'all';

        if (activeFilter === 'vmware') {
          subRow.classList.add('visible');
          subBtns.forEach(b => b.classList.remove('active'));
          subBtns[0].classList.add('active');
        } else {
          subRow.classList.remove('visible');
        }

        applyFilter();
      });
    });

    subBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        subBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeSub = btn.dataset.sub;
        applyFilter();
      });
    });

    try {
      const res = await fetch('/blog-posts.json');
      posts = await res.json();
    } catch (e) {
      grid.innerHTML = '<div class="no-posts"><p>Could not load posts. Please try refreshing.</p></div>';
      return;
    }

    grid.innerHTML = posts.map(buildCard).join('');
    updateCounts(posts);
    applyFilter();

  })();
  </script>

</body>
</html>
