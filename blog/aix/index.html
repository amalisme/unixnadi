  <style>
    .cat-header {
      padding: var(--space-3xl) 0 var(--space-xl);
      border-bottom: 1px solid var(--color-sand-dark);
      margin-bottom: var(--space-xl);
    }
    .cat-header h1 {
      font-family: 'Fraunces', serif;
      color: var(--color-ocean-deep);
      margin-bottom: var(--space-sm);
    }
    .cat-header p {
      color: var(--color-slate-light);
    }
    .post-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: var(--space-xl);
      margin-bottom: var(--space-3xl);
    }
    .post-card {
      background: var(--color-white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--color-sand-dark);
      padding: var(--space-xl);
      transition: box-shadow var(--transition-base), transform var(--transition-base);
      display: flex;
      flex-direction: column;
    }
    .post-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
    }
    .post-card-meta {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
      margin-bottom: var(--space-md);
      flex-wrap: wrap;
    }
    .post-date { font-size: 0.8125rem; color: var(--color-slate-light); }
    .post-read-time { font-size: 0.8125rem; color: var(--color-slate-light); margin-left: auto; }
    .post-card h2 {
      font-family: 'Fraunces', serif;
      font-size: 1.1875rem;
      font-weight: 600;
      color: var(--color-ocean-deep);
      margin-bottom: var(--space-sm);
      line-height: 1.4;
    }
    .post-card h2 a {
      color: inherit;
      text-decoration: none;
      transition: color var(--transition-fast);
    }
    .post-card h2 a:hover { color: var(--color-ocean); }
    .post-excerpt {
      color: var(--color-slate-light);
      font-size: 0.9375rem;
      line-height: 1.6;
      flex: 1;
      margin-bottom: var(--space-md);
    }
    .post-card-footer {
      display: flex;
      align-items: center;
      border-top: 1px solid var(--color-sand-dark);
      padding-top: var(--space-md);
      margin-top: auto;
    }
    .read-more-link {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--color-ocean);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: gap var(--transition-fast);
    }
    .read-more-link:hover { gap: 8px; }
    .no-posts {
      grid-column: 1/-1;
      text-align: center;
      padding: var(--space-3xl);
      color: var(--color-slate-light);
    }
    .back-to-blog {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.875rem;
      color: var(--color-slate-light);
      text-decoration: none;
      margin-bottom: var(--space-xl);
      transition: color var(--transition-fast);
    }
    .back-to-blog:hover { color: var(--color-ocean); }
    /* Subcategory nav pills (VMware parent page only) */
    .sub-nav {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-sm);
      margin-bottom: var(--space-xl);
    }
    .sub-nav-pill {
      display: inline-flex;
      align-items: center;
      padding: 6px 14px;
      border-radius: var(--radius-xl);
      border: 1.5px solid var(--color-sand-dark);
      background: var(--color-white);
      color: var(--color-slate);
      font-size: 0.875rem;
      font-weight: 500;
      text-decoration: none;
      transition: all var(--transition-fast);
    }
    .sub-nav-pill:hover {
      border-color: var(--color-ocean);
      color: var(--color-ocean);
    }
    @media (prefers-color-scheme: dark) {
      .cat-header { border-color: var(--border); }
      .post-card { background: var(--bg-card); border-color: var(--border); }
      .post-card-footer { border-color: var(--border); }
      .sub-nav-pill { background: var(--bg-card); border-color: var(--border); color: var(--text-primary); }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="container">
      <nav class="nav" aria-label="Main navigation">
        <a href="../../" class="nav-logo" aria-label="UnixPulse home">
          <svg viewBox="0 0 200 50" fill="none" aria-hidden="true">
            <path d="M8 15 L18 25 L8 35" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M28 25 L38 25 L44 12 L52 38 L60 18 L66 32 L72 25 L82 25" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <text x="92" y="32" font-family="system-ui, sans-serif" font-size="22" font-weight="600" fill="currentColor">
              <tspan>Unix</tspan><tspan font-weight="400">Pulse</tspan>
            </text>
          </svg>
        </a>
        <ul class="nav-links">
          <li><a href="../../">Home</a></li>
          <li><a href="../../blog/" class="active" aria-current="page">Blog</a></li>
          <li><a href="../../toolbox.html">Toolbox</a></li>
          <li><a href="../../projects.html">Projects</a></li>
          <li><a href="../../work-with-me.html">Work With Me</a></li>
          <li><a href="../../say-hello.html">Say Hello</a></li>
        </ul>
        <button class="theme-toggle" aria-label="Toggle dark mode" id="themeToggle">🌙</button>
        <button class="mobile-menu-btn" aria-label="Open menu" aria-expanded="false" id="mobileMenuBtn">☰</button>
      </nav>
    </div>
  </header>

  <main id="main-content">
    <div class="container">

      <!-- Breadcrumb -->
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <ol class="breadcrumb-list">
      <li class="breadcrumb-item"><a href="https://unixpulse.com/">Home</a></li>
      <li class="breadcrumb-item"><a href="https://unixpulse.com/blog/">Blog</a></li>
      <li class="breadcrumb-item breadcrumb-current" aria-current="page">AIX</li>
        </ol>
      </nav>

      <div class="cat-header">
        <h1>💾 AIX</h1>
        <p>IBM AIX administration guides — filesystems, LVM, system management, and troubleshooting.</p>
      </div>

      <a href="../../blog/" class="back-to-blog">← All posts</a>

      <div class="post-grid" id="postGrid">
        <div class="no-posts"><p>Loading posts…</p></div>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <div class="footer-content">
        <p>© 2026 UnixPulse. Made with ☕ and curiosity.</p>
        <nav class="footer-links" aria-label="Footer navigation">
          <a href="../../about.html">About</a>
          <a href="../../say-hello.html">Contact</a>
          <a href="../../rss.xml">RSS</a>
        </nav>
      </div>
    </div>
  </footer>

  <script>
  (async function() {
    const grid = document.getElementById('postGrid');
    const thisPath = 'aix';

    let posts;
    try {
      const res = await fetch('../../blog-posts.json');
      posts = await res.json();
    } catch(e) {
      grid.innerHTML = '<div class="no-posts"><p>Could not load posts.</p></div>';
      return;
    }

    // Filter to this category/subcategory
    const filtered = posts.filter(p => {
      if (thisPath.includes('/')) {
        return p.categoryPath === thisPath;
      } else {
        return p.categoryPath === thisPath || p.categoryPath.startsWith(thisPath + '/');
      }
    });

    if (filtered.length === 0) {
      grid.innerHTML = '<div class="no-posts"><p>No posts here yet — check back soon.</p></div>';
      return;
    }

    grid.innerHTML = filtered.map(post => {
      const postUrl = `${'../../blog/'}${post.categoryPath}/${post.slug}.html`;
      const sub = post.subcategory ? ` <span style="opacity:0.6;font-size:0.8em">· ${post.subcategory}</span>` : '';
      return `
        <article class="post-card">
          <div class="post-card-meta">
            <span class="post-date">${post.dateDisplay}</span>
            <span class="post-read-time">${post.readTime}</span>
          </div>
          <h2><a href="${postUrl}">${post.title}</a></h2>
          <p class="post-excerpt">${post.excerpt}</p>
          <div class="post-card-footer">
            <a href="${postUrl}" class="read-more-link">Read more →</a>
          </div>
        </article>`;
    }).join('');

  })();
  </script>

</body>
</html>
