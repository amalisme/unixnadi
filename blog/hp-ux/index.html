      <div class="cat-header" style="padding: var(--space-3xl) 0 var(--space-xl); border-bottom: 1px solid var(--border-color); margin-bottom: var(--space-xl);">
        <h1>🖥️ HP-UX</h1>
        <p style="color: var(--text-secondary);">HP-UX system administration notes — practical guides for managing HP-UX environments.</p>
      </div>

      <a href="/blog/" style="display:inline-flex; align-items:center; gap:6px; font-size:0.875rem; color:var(--text-secondary); text-decoration:none; margin-bottom:var(--space-xl); transition:color var(--transition-fast);"
         onmouseover="this.style.color='var(--accent-primary)'"
         onmouseout="this.style.color='var(--text-secondary)'">← All posts</a>

      <div class="posts-grid" id="postGrid">

  <script>
  (async function() {
    const grid = document.getElementById('postGrid');
    const thisPath = 'hp-ux';

    let posts;
    try {
      const res = await fetch('/blog-posts.json');
      posts = await res.json();
    } catch(e) {
      grid.innerHTML = '<p style="color:var(--text-secondary)">Could not load posts.</p>';
      return;
    }

    const filtered = posts.filter(p => {
      if (thisPath.includes('/')) {
        return p.categoryPath === thisPath;
      } else {
        return p.categoryPath === thisPath || p.categoryPath.startsWith(thisPath + '/');
      }
    });

    if (filtered.length === 0) {
      grid.innerHTML = '<p style="color:var(--text-secondary)">No posts here yet — check back soon.</p>';
      return;
    }

    grid.innerHTML = filtered.map(post => {
      const postUrl = `/blog/${post.categoryPath}/${post.slug}`;
      const subBadge = post.subcategory
        ? `<span style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--accent-secondary)">${post.subcategory}</span>`
        : `<span style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.05em;color:var(--accent-secondary)">${post.category}</span>`;
      return `
        <article class="card post-card">
          <div class="card-meta" style="display:flex;align-items:center;gap:var(--space-md);margin-bottom:var(--space-sm);flex-wrap:wrap;">
            ${subBadge}
            <span style="font-size:0.8125rem;color:var(--text-secondary)">${post.dateDisplay}</span>
            <span style="font-size:0.8125rem;color:var(--text-secondary);margin-left:auto">${post.readTime}</span>
          </div>
          <h2 class="card-title"><a href="${postUrl}" style="color:var(--text-heading);text-decoration:none;transition:color var(--transition-fast)" onmouseover="this.style.color='var(--accent-primary)'" onmouseout="this.style.color='var(--text-heading)'">${post.title}</a></h2>
          <p class="card-excerpt">${post.excerpt}</p>
          <a href="${postUrl}" class="card-link">Read more</a>
        </article>`;
    }).join('');

  })();
  </script>
